name: ObjoPublisher for Windows (sign by Azure action)

on:
  workflow_dispatch:

jobs:
  publish-windows:
    uses: madamov/ObjoPublisher/.github/workflows/publish_objo_windows.yml@main

    with:
      solution-file: MyGreatApp.objosln
      project-file: Projects/MyGreatApp/project.json
      application-name: MyGreatApp
      artifact-name: mygreatapp-windows-publish
      output-directory: Publish
      targets: win-x64

      # Optional. Leave this out to detect the latest version.
      # objo-version: 26.7.1

      # Optional. Defaults to application-name plus GitHub run ID.
      # azure-correlation-id: mygreatapp-${{ github.run_id }}

    secrets:
      objo-license: ${{ secrets.OBJO_LICENSE }}

      azure-tenant-id: ${{ secrets.AZURE_TENANTID }}
      azure-client-id: ${{ secrets.AZURE_CLIENTID }}
      azure-client-secret: ${{ secrets.AZURE_CLIENTSECRET }}

      azure-endpoint: ${{ secrets.AZURE_ENDPOINT }}
      azure-account-name: ${{ secrets.AZURE_ACCOUNTNAME }}
      azure-certificate-profile-name: ${{ secrets.AZURE_CERTIFICATEPROFILENAME }}
      azure-package-publisher: ${{ secrets.AZURE_PACKAGEPUBLISHER }}

      # Optional
      azure-timestamp-url: ${{ secrets.AZURE_TIMESTAMPURL }}

  download-windows-artifact:
    name: Download and upload published Windows artifact
    needs: publish-windows
    runs-on: windows-latest

    env:
      SFTP_USER: ${{ secrets.BINARIES_USER }}
      SFTP_PASSWORD: ${{ secrets.BINARIES_PASSWORD }}
      SFTP_BASE_URL: ${{ vars.SFTP_SERVER_URL }}

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: mygreatapp-windows-publish
          path: downloaded-artifacts\mygreatapp-windows-publish

      - name: Show downloaded files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Downloaded artifact contents:"

          Get-ChildItem `
            -Path "downloaded-artifacts" `
            -Recurse `
            -File |
            Select-Object FullName, Length |
            Format-Table -AutoSize

      - name: Trust SFTP server SSH host key
        if: env.SFTP_USER != '' && env.SFTP_PASSWORD != '' && env.SFTP_BASE_URL != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (-not $env:SFTP_BASE_URL.StartsWith("sftp://")) {
            throw "SFTP_SERVER_URL must start with sftp://."
          }

          try {
            $sftpUri = [System.Uri]$env:SFTP_BASE_URL
            $sftpHost = $sftpUri.Host
            $sftpPort = $sftpUri.Port
          }
          catch {
            throw "SFTP_SERVER_URL is not a valid SFTP URL."
          }

          if ([string]::IsNullOrWhiteSpace($sftpHost)) {
            throw "Could not extract the hostname from SFTP_SERVER_URL."
          }

          Write-Host "Adding SSH host key for $sftpHost"

          $sshDirectory = Join-Path $HOME ".ssh"
          $knownHosts = Join-Path $sshDirectory "known_hosts"

          New-Item `
            -ItemType Directory `
            -Path $sshDirectory `
            -Force |
            Out-Null

          if ($sftpPort -gt 0 -and $sftpPort -ne 22) {
            $hostKey = & ssh-keyscan.exe -p $sftpPort -H $sftpHost 2>$null
          }
          else {
            $hostKey = & ssh-keyscan.exe -H $sftpHost 2>$null
          }

          if ($LASTEXITCODE -ne 0 -or -not $hostKey) {
            throw "Failed to retrieve the SSH host key for $sftpHost."
          }

          $hostKey |
            Out-File `
              -FilePath $knownHosts `
              -Encoding ascii `
              -Append

          Write-Host "SSH host key added to $knownHosts"

      - name: Upload Windows artifacts to SFTP
        if: env.SFTP_USER != '' && env.SFTP_PASSWORD != '' && env.SFTP_BASE_URL != ''
        shell: pwsh
        env:
          LOCAL_ARTIFACT_DIR: downloaded-artifacts\mygreatapp-windows-publish
        run: |
          $ErrorActionPreference = "Stop"

          $curl = Get-Command curl.exe -ErrorAction SilentlyContinue

          if (-not $curl) {
            throw "curl.exe is not installed on the Windows runner."
          }

          Write-Host "Installed curl version:"
          $curlVersion = & $curl.Source --version

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to run curl.exe."
          }

          $curlVersion | ForEach-Object {
            Write-Host $_
          }

          $protocolLine = $curlVersion |
            Where-Object { $_ -match "^Protocols:" } |
            Select-Object -First 1

          if (-not $protocolLine) {
            throw "Could not determine which protocols curl supports."
          }

          $protocols = $protocolLine `
            -replace "^Protocols:\s*", "" `
            -split "\s+"

          if ($protocols -notcontains "sftp") {
            throw "The installed curl does not support the SFTP protocol."
          }

          if (-not $env:SFTP_BASE_URL.StartsWith("sftp://")) {
            throw "SFTP_SERVER_URL must start with sftp://."
          }

          if (-not (Test-Path -LiteralPath $env:LOCAL_ARTIFACT_DIR -PathType Container)) {
            throw "Artifact directory was not found: $env:LOCAL_ARTIFACT_DIR"
          }

          $files = @(
            Get-ChildItem `
              -LiteralPath $env:LOCAL_ARTIFACT_DIR `
              -File
          )

          if ($files.Count -eq 0) {
            throw "No Windows artifact files were found to upload."
          }

          $baseUrl = $env:SFTP_BASE_URL.TrimEnd("/")
          $destination = "$baseUrl/windows/"

          Write-Host "Uploading $($files.Count) file(s) to:"
          Write-Host "  $destination"

          foreach ($file in $files) {
            $escapedFilename = [System.Uri]::EscapeDataString($file.Name)
            $remoteUrl = "$destination$escapedFilename"

            Write-Host "Uploading: $($file.Name)"

            & $curl.Source `
              --fail `
              --show-error `
              --silent `
              --ftp-create-dirs `
              --user "${env:SFTP_USER}:${env:SFTP_PASSWORD}" `
              --upload-file $file.FullName `
              $remoteUrl

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload $($file.Name). curl exited with code $LASTEXITCODE."
            }
          }

          Write-Host "Windows artifacts uploaded successfully."
          