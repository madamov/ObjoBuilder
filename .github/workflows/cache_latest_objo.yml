name: Cache Latest Objo Binary

on:
  workflow_dispatch:

jobs:
  cache-binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            prefix: objo_linux
            install_dir: /opt/objo
          - os: macos-latest
            prefix: objo_mac
            install_dir: /Applications/Objo
          - os: windows-latest
            prefix: objo_win
            install_dir: C:/Objo

    runs-on: ${{ matrix.os }}

    steps:
      - name: Install tools on Ubuntu
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Install tools on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install curl p7zip
          echo "$(brew --prefix curl)/bin" >> "$GITHUB_PATH"

      - name: Prepare SSH known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H iad1-shared-b8-11.dreamhost.com >> ~/.ssh/known_hosts

      - name: Find latest archive
        id: latest
        shell: bash
        env:
          USERNAME: ${{ secrets.BINARIES_USER }}
          PASSWORD: ${{ secrets.BINARIES_PASSWORD }}
          PREFIX: ${{ matrix.prefix }}
        run: |
          REMOTE_DIR="/home/$USERNAME/objo.adamov.rs/objo_binaries"
          BASE_URL="sftp://iad1-shared-b8-11.dreamhost.com${REMOTE_DIR}/"

          LATEST_FILE=$(
            curl --fail --silent --show-error --list-only \
              -u "$USERNAME:$PASSWORD" \
              "$BASE_URL" |
            grep -E "^${PREFIX}_[0-9_]+\.7z$" |
            sort -V |
            tail -n 1
          )

          if [ -z "$LATEST_FILE" ]; then
            echo "No archive found for $PREFIX"
            exit 1
          fi

          VERSION="${LATEST_FILE#${PREFIX}_}"
          VERSION="${VERSION%.7z}"

          echo "archive=$LATEST_FILE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

          echo "Latest archive: $LATEST_FILE"
          echo "Version: $VERSION"

      - name: Restore cached extracted binary
        id: cache-objo
        uses: actions/cache@v4
        with:
          path: ${{ matrix.install_dir }}
          key: objo-${{ runner.os }}-${{ steps.latest.outputs.version }}
          restore-keys: |
            objo-${{ runner.os }}-

      - name: Download latest archive
        if: steps.cache-objo.outputs.cache-hit != 'true'
        shell: bash
        env:
          USERNAME: ${{ secrets.BINARIES_USER }}
          PASSWORD: ${{ secrets.BINARIES_PASSWORD }}
          ARCHIVE: ${{ steps.latest.outputs.archive }}
          BASE_URL: ${{ steps.latest.outputs.base_url }}
        run: |
          curl --fail --show-error \
            -u "$USERNAME:$PASSWORD" \
            -o "$ARCHIVE" \
            "${BASE_URL}${ARCHIVE}"

      - name: Extract archive
        if: steps.cache-objo.outputs.cache-hit != 'true'
        shell: bash
        env:
          INSTALL_DIR: ${{ matrix.install_dir }}
          ARCHIVE: ${{ steps.latest.outputs.archive }}
        run: |
          rm -rf "$INSTALL_DIR"
          mkdir -p "$INSTALL_DIR"

          if [ "$RUNNER_OS" = "Windows" ]; then
            export PATH="$PATH:/c/Program Files/7-Zip"
            7z x "$ARCHIVE" "-o$INSTALL_DIR" -y
          else
            sudo 7z x "$ARCHIVE" "-o$INSTALL_DIR" -y
            sudo chmod -R a+rX "$INSTALL_DIR"
          fi

      - name: Show installed files
        shell: bash
        env:
          INSTALL_DIR: ${{ matrix.install_dir }}
        run: |
          ls -la "$INSTALL_DIR"