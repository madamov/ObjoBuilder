name: Publish Ubuntu Objo Application

on:
  workflow_dispatch:

jobs:
  publish-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore cached Objo Studio
        uses: actions/cache/restore@v4
        with:
          path: /opt/objo-studio
          key: objo-studio-linux-
          restore-keys: |
            objo-studio-linux-

      - name: Find Objo executable
        shell: bash
        run: |
          OBJO_BIN=$(find /opt/objo-studio -type f -name objo | head -n1)

          if [[ -z "$OBJO_BIN" ]]; then
            echo "Could not find objo executable"
            exit 1
          fi

          chmod +x "$OBJO_BIN"
          echo "OBJO_BIN=$OBJO_BIN" >> "$GITHUB_ENV"

      - name: Activate Objo license
        env:
          OBJO_LICENSE: ${{ secrets.OBJO_LICENSE }}
        run: |
          LICENSE_FILE="$RUNNER_TEMP/objo-license-key.txt"
          printf '%s' "$OBJO_LICENSE" > "$LICENSE_FILE"
          "$OBJO_BIN" license activate --key-file "$LICENSE_FILE"
          rm -f "$LICENSE_FILE"

      - name: Publish Linux app
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            "$OBJO_BIN" license deactivate || true
          }
          trap cleanup EXIT

          mkdir -p ~/Publish

          "$OBJO_BIN" publish "MyGreatApp.objosln" \
            --rid linux-x64 \
            --output ~/Publish

          ls -al ~/Publish
          
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: objo-linux-publish
          path: ~/Publish/Linux-x64/Handoff/*.tar.gz
