name: Check Objo Solution Syntax

on:
  workflow_dispatch:
  pull_request:

jobs:
  check-objo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version
        id: version
        shell: bash
        run: |
          VERSION=$(
            curl -fsSL https://objo.dev/download |
            grep -oE 'Latest version:[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+' |
            head -n1 |
            sed -E 's/Latest version:[[:space:]]*//'
          )

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore Objo Studio cache
        id: cache-objo
        uses: actions/cache@v4
        with:
          path: /opt/objo-studio
          key: objo-studio-linux-${{ steps.version.outputs.version }}

      - name: Download and extract Objo Studio
        if: steps.cache-objo.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="Objo-Studio-${VERSION}-linux-x64.tar.gz"
          URL="https://downloads.objo.dev/releases/${VERSION}/${ARCHIVE}"

          mkdir -p /opt/objo-studio

          curl -fL "$URL" -o "$ARCHIVE"
          tar -xzf "$ARCHIVE" -C /opt/objo-studio

      - name: Find Objo executable
        shell: bash
        run: |
          OBJO_BIN=$(find /opt/objo-studio -type f -name objo | head -n1)

          if [[ -z "$OBJO_BIN" ]]; then
            echo "Could not find objo executable"
            exit 1
          fi

          chmod +x "$OBJO_BIN"
          echo "OBJO_BIN=$OBJO_BIN" >> "$GITHUB_ENV"

      - name: Activate Objo license
        shell: bash
        env:
          OBJO_LICENSE: ${{ secrets.OBJO_LICENSE }}
        run: |
          LICENSE_FILE="$RUNNER_TEMP/objo-license-key.txt"

          printf '%s' "$OBJO_LICENSE" > "$LICENSE_FILE"

          "$OBJO_BIN" license activate --key-file "$LICENSE_FILE"

          rm -f "$LICENSE_FILE"

      - name: Check Objo solution syntax
        shell: bash
        run: |
          "$OBJO_BIN" check MyGreatApp.objosln
          "$OBJO_BIN" license deactivate
          