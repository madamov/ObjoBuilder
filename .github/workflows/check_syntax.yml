name: Check Syntax (restores full Objo Studio)

on:
  workflow_dispatch:
  pull_request:

jobs:
  check-objo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest Objo Studio release information
        id: latest
        if: inputs.objo-version == ''
        shell: bash
        run: |
          set -euo pipefail
      
          JSON_URL="https://objo.dev/releases/stable.json"
      
          curl -fsSL "$JSON_URL" -o stable.json
      
          VERSION="$(jq -r '.version' stable.json)"
          DOWNLOAD_URL="$(jq -r '.downloads.linux.url' stable.json)"
      
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Failed to determine latest version."
            exit 1
          fi
      
          if [[ -z "$DOWNLOAD_URL" || "$DOWNLOAD_URL" == "null" ]]; then
            echo "Failed to determine Linux download URL."
            exit 1
          fi
      
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
      
          echo "Latest version: $VERSION"
          echo "Download URL: $DOWNLOAD_URL"

      - name: Restore Objo Studio cache
        id: cache-objo
        uses: actions/cache@v4
        with:
          path: /opt/objo-studio
          key: objo-studio-linux-${{ steps.latest.outputs.version }}

      - name: Download and extract Objo Studio
        if: steps.cache-objo.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.latest.outputs.version }}"
          URL=${{ steps.latest.outputs.download_url }}
          ARCHIVE="$(basename "$URL")"

          mkdir -p /opt/objo-studio

          curl -fL "$URL" -o "$ARCHIVE"
          tar -xzf "$ARCHIVE" -C /opt/objo-studio
          
          
      - name: Find Objo executable
        shell: bash
        run: |
          OBJO_BIN=$(find /opt/objo-studio -type f -name objo | head -n1)

          if [[ -z "$OBJO_BIN" ]]; then
            echo "Could not find objo executable"
            exit 1
          fi

          chmod +x "$OBJO_BIN"
          echo "OBJO_BIN=$OBJO_BIN" >> "$GITHUB_ENV"

      - name: Activate Objo license
        shell: bash
        env:
          OBJO_LICENSE: ${{ secrets.OBJO_LICENSE }}
        run: |
          LICENSE_FILE="$RUNNER_TEMP/objo-license-key.txt"

          printf '%s' "$OBJO_LICENSE" > "$LICENSE_FILE"

          "$OBJO_BIN" license activate --key-file "$LICENSE_FILE"

          rm -f "$LICENSE_FILE"

      - name: Check Objo solution syntax
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            "$OBJO_BIN" license deactivate || true
          }

          trap cleanup EXIT

          mapfile -d '' SOLUTION_FILES < <(
            find "$GITHUB_WORKSPACE" \
              -type f \
              -name '*.objosln' \
              -print0
          )

          if (( ${#SOLUTION_FILES[@]} == 0 )); then
            echo "No .objosln file was found in the repository." >&2
            exit 1
          fi

          if (( ${#SOLUTION_FILES[@]} > 1 )); then
            echo "Multiple .objosln files were found:" >&2

            for solution_file in "${SOLUTION_FILES[@]}"; do
              echo "  $solution_file" >&2
            done

            echo "The workflow cannot determine which solution to check." >&2
            exit 1
          fi

          SOLUTION_FILE="${SOLUTION_FILES[0]}"

          echo "Checking Objo solution:"
          echo "  $SOLUTION_FILE"

          "$OBJO_BIN" check "$SOLUTION_FILE"
          