# Caches the latest version of Object Studio from https://objo.dev/download
# for each platform

name: Cache Objo Studio

on:
  workflow_dispatch:

jobs:
  cache-macos:
    runs-on: macos-latest

    steps:
      - name: Get latest Objo Studio release information
        id: latest
        if: inputs.objo-version == ''
        shell: bash
        run: |
          set -euo pipefail
      
          JSON_URL="https://objo.dev/releases/stable.json"
      
          curl -fsSL "$JSON_URL" -o stable.json
      
          VERSION="$(jq -r '.version' stable.json)"
          DOWNLOAD_URL="$(jq -r '.downloads.linux.url' stable.json)"
      
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Failed to determine latest version."
            exit 1
          fi
      
          if [[ -z "$DOWNLOAD_URL" || "$DOWNLOAD_URL" == "null" ]]; then
            echo "Failed to determine Linux download URL."
            exit 1
          fi
      
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
      
          echo "Latest version: $VERSION"
          echo "Download URL: $DOWNLOAD_URL"

      - name: Restore Objo Studio cache
        id: cache-objo
        uses: actions/cache@v4
        with:
          path: /Applications/Objo Studio.app
          key: objo-studio-macos-${{ steps.version.outputs.version }}

      - name: Download and install Objo Studio
        if: steps.cache-objo.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          URL="${{ steps.latest.outputs.download_url }}"
          DMG="$(basename "$URL")"

          curl -fL "$URL" -o "$DMG"

          MOUNT_POINT=$(
            hdiutil attach "$DMG" -nobrowse |
            awk '/\/Volumes\// {print substr($0, index($0, "/Volumes/")); exit}'
          )

          if [[ -z "$MOUNT_POINT" ]]; then
            echo "Could not determine DMG mount point" >&2
            exit 1
          fi

          APP_PATH=$(find "$MOUNT_POINT" -maxdepth 2 -name "Objo Studio.app" -type d | head -n1)

          if [[ -z "$APP_PATH" ]]; then
            echo "Could not find Objo Studio.app inside DMG" >&2
            hdiutil detach "$MOUNT_POINT" -quiet
            exit 1
          fi

          rm -rf "/Applications/Objo Studio.app"
          cp -R "$APP_PATH" /Applications/

          hdiutil detach "$MOUNT_POINT" -quiet

  cache-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest Objo Studio release information
        id: latest
        if: inputs.objo-version == ''
        shell: bash
        run: |
          set -euo pipefail
      
          JSON_URL="https://objo.dev/releases/stable.json"
      
          curl -fsSL "$JSON_URL" -o stable.json
      
          VERSION="$(jq -r '.version' stable.json)"
          DOWNLOAD_URL="$(jq -r '.downloads.macos.url' stable.json)"
      
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Failed to determine latest version."
            exit 1
          fi
      
          if [[ -z "$DOWNLOAD_URL" || "$DOWNLOAD_URL" == "null" ]]; then
            echo "Failed to determine Linux download URL."
            exit 1
          fi
      
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
      
          echo "Latest version: $VERSION"
          echo "Download URL: $DOWNLOAD_URL"

      - name: Restore Objo Studio cache
        id: cache-objo
        uses: actions/cache@v4
        with:
          path: /opt/objo-studio
          key: objo-studio-linux-${{ steps.version.outputs.version }}

      - name: Download and extract Objo Studio
        if: steps.cache-objo.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          URL=${{ steps.latest.outputs.download_url }}
          ARCHIVE="$(basename "$URL")"

          mkdir -p /opt/objo-studio

          curl -fL "$URL" -o "$ARCHIVE"
          tar -xzf "$ARCHIVE" -C /opt/objo-studio

  cache-windows:
    runs-on: windows-latest

    steps:
      - name: Get latest Objo Studio release information
        id: latest
        if: inputs.objo-version == ''
        shell: bash
        run: |
          set -euo pipefail
      
          curl -fsSL https://objo.dev/releases/stable.json -o stable.json
      
          VERSION="$(jq -r '.version' stable.json)"
      
          DOWNLOAD_URL="$(
            jq -r '
              .downloads.windows.variant_items[]
              | select(.platform=="win-x64-portable")
              | .url
            ' stable.json
          )"
      
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
      
          echo "Latest version: $VERSION"
          echo "Download URL: $DOWNLOAD_URL"

      - name: Restore Objo Studio cache
        id: cache-objo
        uses: actions/cache@v4
        with:
          path: C:\Objo
          key: objo-studio-windows-${{ steps.version.outputs.version }}

      - name: Download and extract Objo Studio portable
        if: steps.cache-objo.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $url = "${{ steps.latest.outputs.download_url }}"
          $zip = Split-Path $url -Leaf

          New-Item -ItemType Directory -Force -Path "C:\Objo" | Out-Null

          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "C:\Objo" -Force
