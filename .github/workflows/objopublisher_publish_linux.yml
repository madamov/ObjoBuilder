name: ObjoPublisher for Linux

on:
  workflow_dispatch:

jobs:
  publish-linux:
    uses: madamov/ObjoPublisher/.github/workflows/publish_objo_linux.yml@main

    with:
      solution-file: MyGreatApp.objosln
      project-file: Projects/MyGreatApp/project.json
      application-name: MyGreatApp
      output-directory: Publish
      targets: "linux-x64"
      artifact-name: mygreatapp-linux-publish

    secrets:
      objo-license: ${{ secrets.OBJO_LICENSE }}

  download-linux-artifact:
    name: Download published Linux artifact
    needs: publish-linux
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: mygreatapp-linux-publish
          path: downloaded-artifacts/mygreatapp-linux-publish

      - name: Show downloaded files
        shell: bash
        run: |
          set -euo pipefail

          echo "Downloaded artifact contents:"
          find downloaded-artifacts \
            -type f \
            -print

       - name: Trust DreamHost SSH host key
         shell: bash
         run: |
           set -euo pipefail
       
           mkdir -p ~/.ssh
           chmod 700 ~/.ssh
       
           ssh-keyscan -H iad1-shared-b8-11.dreamhost.com >> ~/.ssh/known_hosts
       
           chmod 600 ~/.ssh/known_hosts
           
      - name: Upload Linux artifacts to SFTP
        shell: bash
        env:
          SFTP_USER: ${{ secrets.BINARIES_USER }}
          SFTP_PASSWORD: ${{ secrets.BINARIES_PASSWORD }}
          LOCAL_ARTIFACT_DIR: downloaded-artifacts/mygreatapp-linux-publish
          SFTP_DESTINATION: sftp://iad1-shared-b8-11.dreamhost.com//home/objo_user/objo.adamov.rs/OurApps/MyGreatApp/linux/
        run: |
          set -euo pipefail

          echo "Installed curl version:"
          curl --version

          protocols="$(
            curl --version |
              awk '
                /^Protocols:/ {
                  for (i = 2; i <= NF; i++) {
                    print $i
                  }
                }
              '
          )"

          if ! grep -qx "sftp" <<< "$protocols"; then
            echo "The installed curl does not support the SFTP protocol." >&2
            echo "Supported protocols:" >&2
            printf '  %s\n' $protocols >&2
            exit 1
          fi

          if [[ -z "$SFTP_USER" ]]; then
            echo "BINARIES_USER is not configured." >&2
            exit 1
          fi

          if [[ -z "$SFTP_PASSWORD" ]]; then
            echo "BINARIES_PASSWORD is not configured." >&2
            exit 1
          fi

          if [[ ! -d "$LOCAL_ARTIFACT_DIR" ]]; then
            echo "Artifact directory was not found:" >&2
            echo "  $LOCAL_ARTIFACT_DIR" >&2
            exit 1
          fi

          mapfile -d '' files < <(
            find "$LOCAL_ARTIFACT_DIR" \
              -maxdepth 1 \
              -type f \
              -print0
          )

          if (( ${#files[@]} == 0 )); then
            echo "No files were found to upload." >&2
            exit 1
          fi

          echo "Uploading ${#files[@]} file(s) to:"
          echo "  $SFTP_DESTINATION"

          for file in "${files[@]}"; do
            filename="$(basename "$file")"

            echo "Uploading: $filename"

            curl \
              --fail \
              --show-error \
              --silent \
              --ftp-create-dirs \
              --user "$SFTP_USER:$SFTP_PASSWORD" \
              --upload-file "$file" \
              "${SFTP_DESTINATION}${filename}"
          done

          echo "Linux artifacts uploaded successfully."
