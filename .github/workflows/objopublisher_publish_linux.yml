name: ObjoPublisher for Linux

on:
  workflow_dispatch:

jobs:
  publish-linux:
    uses: madamov/ObjoPublisher/.github/workflows/publish_objo_linux.yml@v1

    with:
      solution-file: MyGreatApp.objosln
      project-file: Projects/MyGreatApp/project.json
      application-name: MyGreatApp
      output-directory: Publish
      targets: "linux-x64"
      artifact-name: mygreatapp-linux-publish
      # objo-version: "26.7.2"

    secrets:
      objo-license: ${{ secrets.OBJO_LICENSE }}

  download-linux-artifact:
    name: Download published Linux artifact
    needs: publish-linux
    runs-on: ubuntu-latest

    env:
      SFTP_USER: ${{ secrets.BINARIES_USER }}
      SFTP_PASSWORD: ${{ secrets.BINARIES_PASSWORD }}
      SFTP_BASE_URL: ${{ vars.SFTP_SERVER_URL }}

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: mygreatapp-linux-publish
          path: downloaded-artifacts/mygreatapp-linux-publish

      - name: Show downloaded files
        shell: bash
        run: |
          set -euo pipefail

          echo "Downloaded artifact contents:"
          find downloaded-artifacts \
            -type f \
            -print

      - name: Trust SFTP server SSH host key
        if: env.SFTP_USER != '' && env.SFTP_PASSWORD != '' && env.SFTP_BASE_URL != ''
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$SFTP_BASE_URL" != sftp://* ]]; then
            echo "SFTP_SERVER_URL must start with sftp://." >&2
            exit 1
          fi

          SFTP_HOST="$(
            printf '%s' "$SFTP_BASE_URL" |
              sed -E 's#^sftp://([^/@]+@)?([^/:]+)(:[0-9]+)?/.*#\2#'
          )"

          if [[ -z "$SFTP_HOST" ]]; then
            echo "Could not extract the host from SFTP_SERVER_URL." >&2
            exit 1
          fi

          echo "Adding SSH host key for $SFTP_HOST"

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          ssh-keyscan -H "$SFTP_HOST" >> "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Upload Linux artifacts to SFTP
        if: env.SFTP_USER != '' && env.SFTP_PASSWORD != '' && env.SFTP_BASE_URL != ''
        shell: bash
        env:
          LOCAL_ARTIFACT_DIR: downloaded-artifacts/mygreatapp-linux-publish
        run: |
          set -euo pipefail

          echo "Installed curl version:"
          curl --version

          protocols="$(
            curl --version |
              awk '
                /^Protocols:/ {
                  for (i = 2; i <= NF; i++) {
                    print $i
                  }
                }
              '
          )"

          if ! grep -qx "sftp" <<< "$protocols"; then
            echo "The installed curl does not support SFTP." >&2
            echo "Supported protocols:" >&2
            printf '  %s\n' $protocols >&2
            exit 1
          fi

          if [[ "$SFTP_BASE_URL" != sftp://* ]]; then
            echo "SFTP_SERVER_URL must start with sftp://." >&2
            exit 1
          fi

          if [[ ! -d "$LOCAL_ARTIFACT_DIR" ]]; then
            echo "Artifact directory was not found:" >&2
            echo "  $LOCAL_ARTIFACT_DIR" >&2
            exit 1
          fi

          mapfile -d '' files < <(
            find "$LOCAL_ARTIFACT_DIR" \
              -maxdepth 1 \
              -type f \
              -print0
          )

          if (( ${#files[@]} == 0 )); then
            echo "No files were found to upload." >&2
            exit 1
          fi

          SFTP_DESTINATION="${SFTP_BASE_URL%/}/linux/"

          echo "Uploading ${#files[@]} file(s) to:"
          echo "  $SFTP_DESTINATION"

          for file in "${files[@]}"; do
            filename="$(basename "$file")"

            echo "Uploading: $filename"

            curl \
              --fail \
              --show-error \
              --silent \
              --ftp-create-dirs \
              --user "$SFTP_USER:$SFTP_PASSWORD" \
              --upload-file "$file" \
              "${SFTP_DESTINATION}${filename}"
          done

          echo "Linux artifacts uploaded successfully."

