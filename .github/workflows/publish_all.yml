name: Publish for all

# Publish on each platform one at the time
# Signs and notarise on macOS
# Signs using Artifact Trusted Signing (Azure Trusted Signing) GitHub action on Windows
# Puts resulting archives in artifacts of the GitHub action run

on:
  workflow_dispatch:

jobs:
  publish-macos:
    runs-on: macos-latest

    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_NAME: ${{ secrets.APPLE_CERTIFICATE_NAME }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_NOTARY_PROFILE: objo-notarization

    steps:
      - uses: actions/checkout@v4

      - name: Check Apple signing secrets
        id: apple-signing
        shell: bash
        run: |
          set -euo pipefail

          missing=()

          [[ -n "$APPLE_CERTIFICATE" ]] || missing+=("APPLE_CERTIFICATE")
          [[ -n "$APPLE_CERTIFICATE_NAME" ]] || missing+=("APPLE_CERTIFICATE_NAME")
          [[ -n "$APPLE_CERTIFICATE_PASSWORD" ]] || missing+=("APPLE_CERTIFICATE_PASSWORD")
          [[ -n "$APPLE_TEAM_ID" ]] || missing+=("APPLE_TEAM_ID")
          [[ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]] || missing+=("APPLE_APP_SPECIFIC_PASSWORD")

          if (( ${#missing[@]} > 0 )); then

            echo "Apple signing configuration is incomplete."
            echo "Certificate installation will be skipped."
            echo "Missing secrets: ${missing[*]}"
            echo "available=false" >> "$GITHUB_OUTPUT"

          else

            echo "All Apple signing secrets are available."
            echo "available=true" >> "$GITHUB_OUTPUT"

          fi

      - name: Install Apple signing certificate
        if: steps.apple-signing.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail

          CERTIFICATE_PATH="$RUNNER_TEMP/apple-signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/apple-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          security default-keychain -d user -s "$KEYCHAIN_PATH"

          rm -f "$CERTIFICATE_PATH"
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "Apple signing certificate installed:"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Verify expected certificate
        if: steps.apple-signing.outputs.available == 'true'
        shell: bash
        run: |

          set -euo pipefail

          if ! security find-identity \
            -v \
            -p codesigning \
            "$APPLE_KEYCHAIN_PATH" |
            grep -Fq "$APPLE_CERTIFICATE_NAME"; then
            echo "Expected certificate was not found:" >&2
            echo "$APPLE_CERTIFICATE_NAME" >&2
            exit 1
          fi

          echo "Certificate verified: $APPLE_CERTIFICATE_NAME"

      - name: Apple signing unavailable
        if: steps.apple-signing.outputs.available != 'true'
        shell: bash
        run: |
          echo "Skipping Apple certificate installation."

      - name: Create Apple notarization profile
        if: steps.apple-signing.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Creating notarization profile: $APPLE_NOTARY_PROFILE"

          xcrun notarytool store-credentials "$APPLE_NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --keychain "$APPLE_KEYCHAIN_PATH"

      - name: Configure macOS signing in project.json
        if: steps.apple-signing.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_FILE="Projects/MyGreatApp/project.json"
          TMP_FILE="$(mktemp)"

          jq \
            --arg identity "$APPLE_CERTIFICATE_NAME" \
            --arg team "$APPLE_TEAM_ID" \
            --arg profile "$APPLE_NOTARY_PROFILE" \
            '
            .Metadata.Signing.MacOS.SigningIdentity = $identity |
            .Metadata.Signing.MacOS.TeamId = $team |
            .Metadata.Signing.MacOS.NotarizationProfile = $profile
            ' \
            "$PROJECT_FILE" > "$TMP_FILE"

          mv "$TMP_FILE" "$PROJECT_FILE"

          echo "Updated signing section:"
          jq '.Metadata.Signing.MacOS' "$PROJECT_FILE"
          cat $PROJECT_FILE

      - name: Restore cached Objo Studio
        uses: actions/cache/restore@v4
        with:
          path: /Applications/Objo Studio.app
          key: objo-studio-macos-
          restore-keys: |
            objo-studio-macos-

      - name: Find Objo executable
        shell: bash
        run: |
          OBJO_BIN=$(find "/Applications/Objo Studio.app" -type f -name objo | head -n1)

          if [[ -z "$OBJO_BIN" ]]; then
            echo "Could not find objo executable"
            exit 1
          fi

          chmod +x "$OBJO_BIN"
          echo "OBJO_BIN=$OBJO_BIN" >> "$GITHUB_ENV"

      - name: Activate Objo license
        env:
          OBJO_LICENSE: ${{ secrets.OBJO_LICENSE }}
        run: |
          LICENSE_FILE="$RUNNER_TEMP/objo-license-key.txt"
          printf '%s' "$OBJO_LICENSE" > "$LICENSE_FILE"
          "$OBJO_BIN" license activate --key-file "$LICENSE_FILE"
          rm -f "$LICENSE_FILE"

      - name: Publish macOS app
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            "$OBJO_BIN" license deactivate || true
          }
          trap cleanup EXIT

          mkdir -p "$HOME/Documents/Publish"

          "$OBJO_BIN" publish "MyGreatApp.objosln" \
            --rid osx-arm64 \
            --rid osx-x64 \
            --output "$HOME/Documents/Publish"

      - name: Rename macOS disk images
        shell: bash
        run: |
          set -euo pipefail

          PUBLISH_DIR="$HOME/Documents/Publish"
          ARTIFACT_DIR="$PUBLISH_DIR/artifacts"

          mkdir -p "$ARTIFACT_DIR"

          ARM_DMG="$PUBLISH_DIR/macOS-Apple-Silicon/MyGreatApp.dmg"
          INTEL_DMG="$PUBLISH_DIR/macOS-Intel/MyGreatApp.dmg"

          if [[ ! -f "$ARM_DMG" ]]; then
            echo "Apple Silicon DMG not found: $ARM_DMG" >&2
            exit 1
          fi

          if [[ ! -f "$INTEL_DMG" ]]; then
            echo "Intel DMG not found: $INTEL_DMG" >&2
            exit 1
          fi

          cp "$ARM_DMG" "$ARTIFACT_DIR/MyGreatApp-macOS-Apple-Silicon.dmg"
          cp "$INTEL_DMG" "$ARTIFACT_DIR/MyGreatApp-macOS-Intel.dmg"

          ls -lh "$ARTIFACT_DIR"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: objo-macos-publish
          path: ~/Documents/Publish/artifacts/*.dmg
          if-no-files-found: error
          

  publish-linux:
    needs: publish-macos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore cached Objo Studio
        uses: actions/cache/restore@v4
        with:
          path: /opt/objo-studio
          key: objo-studio-linux-
          restore-keys: |
            objo-studio-linux-

      - name: Find Objo executable
        shell: bash
        run: |
          OBJO_BIN=$(find /opt/objo-studio -type f -name objo | head -n1)

          if [[ -z "$OBJO_BIN" ]]; then
            echo "Could not find objo executable"
            exit 1
          fi

          chmod +x "$OBJO_BIN"
          echo "OBJO_BIN=$OBJO_BIN" >> "$GITHUB_ENV"

      - name: Activate Objo license
        env:
          OBJO_LICENSE: ${{ secrets.OBJO_LICENSE }}
        run: |
          LICENSE_FILE="$RUNNER_TEMP/objo-license-key.txt"
          printf '%s' "$OBJO_LICENSE" > "$LICENSE_FILE"
          "$OBJO_BIN" license activate --key-file "$LICENSE_FILE"
          rm -f "$LICENSE_FILE"

      - name: Publish Linux app
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            "$OBJO_BIN" license deactivate || true
          }
          trap cleanup EXIT

          mkdir -p ~/Publish

          "$OBJO_BIN" publish "MyGreatApp.objosln" \
            --rid linux-x64 \
            --output ~/Publish

          ls -al ~/Publish
          
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: objo-linux-publish
          path: ~/Publish/Linux-x64/Handoff/*.tar.gz

  publish-windows:
    runs-on: windows-latest
    needs: publish-linux

    steps:
      - uses: actions/checkout@v4

      - name: Restore cached Objo Studio
        uses: actions/cache/restore@v4
        with:
          path: C:\Objo
          key: objo-studio-windows-
          restore-keys: |
            objo-studio-windows-

      - name: Find Objo executable
        shell: pwsh
        run: |
          $objo = Get-ChildItem -Path "C:\Objo" -Recurse -Filter "objo.exe" -File |
            Select-Object -First 1

          if (-not $objo) {
            Write-Error "Could not find objo.exe"
            exit 1
          }

          "OBJO_BIN=$($objo.FullName)" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Found Objo executable:"
          Write-Host $objo.FullName


      - name: Turn off Windows signing in project.json
        shell: bash
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNTNAME }}
          AZURE_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CERTIFICATEPROFILENAME }}
          AZURE_CORRELATION_ID: github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}
          AZURE_TIMESTAMP_URL: ${{ secrets.AZURE_TIMESTAMPURL }}
          AZURE_PACKAGE_PUBLISHER: ${{ secrets.AZURE_PACKAGEPUBLISHER }}
        run: |
          set -euo pipefail

          PROJECT_FILE="Projects/MyGreatApp/project.json"
          TMP_FILE="$(mktemp)"

          if [[ ! -f "$PROJECT_FILE" ]]; then
            echo "Could not find $PROJECT_FILE" >&2
            exit 1
          fi

          jq \
            --arg endpoint "" \
            --arg account "" \
            --arg profile "" \
            --arg correlation "" \
            --arg timestamp "" \
            --arg publisher "$AZURE_PACKAGE_PUBLISHER" \
            '
            .Metadata.Signing.Windows.AzureEndpoint = $endpoint |
            .Metadata.Signing.Windows.AzureAccountName = $account |
            .Metadata.Signing.Windows.AzureCertificateProfileName = $profile |
            .Metadata.Signing.Windows.AzureCorrelationId = $correlation |
            .Metadata.Signing.Windows.TimestampUrl = $timestamp |
            .Metadata.Signing.Windows.PackagePublisher = $publisher
            ' \
            "$PROJECT_FILE" > "$TMP_FILE"

          mv "$TMP_FILE" "$PROJECT_FILE"

          echo "Updated Windows signing section:"
          jq '.Metadata.Signing.Windows' "$PROJECT_FILE"

      - name: Activate license and publish Windows app
        shell: pwsh
        env:
          OBJO_LICENSE: ${{ secrets.OBJO_LICENSE }}
        run: |
          $licenseFile = Join-Path $env:RUNNER_TEMP "objo-license-key.txt"
          $publishExitCode = 1

          try {
            Set-Content `
              -Path $licenseFile `
              -Value $env:OBJO_LICENSE `
              -NoNewline

            & "$env:OBJO_BIN" license activate --key-file $licenseFile

            if ($LASTEXITCODE -ne 0) {
              Write-Error "License activation failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }

            New-Item -ItemType Directory -Force -Path "C:\Publish" |
              Out-Null

            & "$env:OBJO_BIN" publish "MyGreatApp.objosln" `
              --rid win-x64 `
              --output "C:\Publish"

            $publishExitCode = $LASTEXITCODE
            Write-Host "objo publish exit code: $publishExitCode"
          }
          finally {
            & "$env:OBJO_BIN" license deactivate
            $deactivateExitCode = $LASTEXITCODE

            Write-Host "objo license deactivate exit code: $deactivateExitCode"

            Remove-Item `
              $licenseFile `
              -Force `
              -ErrorAction SilentlyContinue
          }

          exit $publishExitCode

      - name: Install Trusted Signing Module
        run: Install-Module -Name TrustedSigning -Force -Scope CurrentUser
        shell: pwsh


      - name: Sign files with Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANTID }}
          azure-client-id: ${{ secrets.AZURE_CLIENTID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENTSECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_ACCOUNTNAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATEPROFILENAME }}
          files-folder: C:\Publish\Windows-x64\
          files-folder-filter: msix
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: ${{ secrets.AZURE_TIMESTAMPURL }}
          timestamp-digest: SHA256


      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: objo-windows-publish
          path: C:\Publish\Windows-x64\*.msix
          if-no-files-found: error
