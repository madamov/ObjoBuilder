name: Publish Objo Application

on:
  workflow_dispatch:

jobs:
  publish-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore cached Objo Studio
        uses: actions/cache/restore@v4
        with:
          path: /Applications/Objo Studio.app
          key: objo-studio-macos-
          restore-keys: |
            objo-studio-macos-

      - name: Find Objo executable
        shell: bash
        run: |
          OBJO_BIN=$(find "/Applications/Objo Studio.app" -type f -name objo | head -n1)

          if [[ -z "$OBJO_BIN" ]]; then
            echo "Could not find objo executable"
            exit 1
          fi

          chmod +x "$OBJO_BIN"
          echo "OBJO_BIN=$OBJO_BIN" >> "$GITHUB_ENV"

      - name: Activate Objo license
        env:
          OBJO_LICENSE: ${{ secrets.OBJO_LICENSE }}
        run: |
          LICENSE_FILE="$RUNNER_TEMP/objo-license-key.txt"
          printf '%s' "$OBJO_LICENSE" > "$LICENSE_FILE"
          "$OBJO_BIN" license activate --key-file "$LICENSE_FILE"
          rm -f "$LICENSE_FILE"

      - name: Publish macOS app
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            "$OBJO_BIN" license deactivate || true
          }
          trap cleanup EXIT

          mkdir -p "$HOME/Documents/Publish"

          "$OBJO_BIN" publish "MyGreatApp.objosln" \
            --rid osx-arm64 \
            --rid osx-x64 \
            --output "$HOME/Documents/Publish"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: objo-macos-publish
          path: ~/Documents/Publish/*.dmg

  publish-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore cached Objo Studio
        uses: actions/cache/restore@v4
        with:
          path: /opt/objo-studio
          key: objo-studio-linux-
          restore-keys: |
            objo-studio-linux-

      - name: Find Objo executable
        shell: bash
        run: |
          OBJO_BIN=$(find /opt/objo-studio -type f -name objo | head -n1)

          if [[ -z "$OBJO_BIN" ]]; then
            echo "Could not find objo executable"
            exit 1
          fi

          chmod +x "$OBJO_BIN"
          echo "OBJO_BIN=$OBJO_BIN" >> "$GITHUB_ENV"

      - name: Activate Objo license
        env:
          OBJO_LICENSE: ${{ secrets.OBJO_LICENSE }}
        run: |
          LICENSE_FILE="$RUNNER_TEMP/objo-license-key.txt"
          printf '%s' "$OBJO_LICENSE" > "$LICENSE_FILE"
          "$OBJO_BIN" license activate --key-file "$LICENSE_FILE"
          rm -f "$LICENSE_FILE"

      - name: Publish Linux app
        shell: bash
        run: |
          set -euo pipefail

          cleanup() {
            "$OBJO_BIN" license deactivate || true
          }
          trap cleanup EXIT

          mkdir -p Publish

          "$OBJO_BIN" publish "MyGreatApp.objosln" \
            --rid linux-x64 \
            --output Publish

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: objo-linux-publish
          path: Publish/*.tar.gz

  publish-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore cached Objo Studio
        uses: actions/cache/restore@v4
        with:
          path: C:\Objo
          key: objo-studio-windows-
          restore-keys: |
            objo-studio-windows-

      - name: Find Objo executable
        shell: pwsh
        run: |
          $objo = Get-ChildItem -Path "C:\Objo" -Recurse -Filter "objo.exe" -File |
            Select-Object -First 1

          if (-not $objo) {
            Write-Error "Could not find objo.exe"
            exit 1
          }

          "OBJO_BIN=$($objo.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Activate Objo license
        shell: pwsh
        env:
          OBJO_LICENSE: ${{ secrets.OBJO_LICENSE }}
        run: |
          $licenseFile = Join-Path $env:RUNNER_TEMP "objo-license-key.txt"
          Set-Content -Path $licenseFile -Value $env:OBJO_LICENSE -NoNewline
          & "$env:OBJO_BIN" license activate --key-file $licenseFile
          Remove-Item $licenseFile -Force

      - name: Publish Windows app
        shell: pwsh
        run: |
          try {
            New-Item -ItemType Directory -Force -Path Publish | Out-Null

            & "$env:OBJO_BIN" publish "MyGreatApp.objosln" `
              --rid win-x64 `
              --output Publish

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
          finally {
            & "$env:OBJO_BIN" license deactivate
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: objo-windows-publish
          path: Publish/*.msix
          