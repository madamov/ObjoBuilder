name: ObjoPublisher for macOS

on:
  workflow_dispatch:

jobs:
  publish-macos:
    uses: madamov/ObjoPublisher/.github/workflows/publish_objo_macos.yml@v1
    
    with:
      solution-file: MyGreatApp.objosln
      project-file: Projects/MyGreatApp/project.json
      application-name: MyGreatApp
      artifact-name: mygreatapp-macos-publish
      apple-notary-profile: mygreatapp-notarization
      # targets: osx-x64

      # Optional. Leave this out to detect the latest version.
      # objo-version: 26.7.1

    secrets:
      apple-certificate: ${{ secrets.APPLE_CERTIFICATE }}
      apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      apple-app-specific-password: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      objo-license: ${{ secrets.OBJO_LICENSE }}
      apple-certificate-name: ${{ secrets.APPLE_CERTIFICATE_NAME }}
      apple-team-id: ${{ secrets.APPLE_TEAM_ID }}
      apple-id: ${{ secrets.APPLE_ID }}

  download-macos-artifact:
    name: Download published macOS artifacts
    needs: publish-macos
    runs-on: macos-latest

    env:
      SFTP_USER: ${{ secrets.BINARIES_USER }}
      SFTP_PASSWORD: ${{ secrets.BINARIES_PASSWORD }}
      SFTP_BASE_URL: ${{ vars.SFTP_SERVER_URL }}

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mygreatapp-macos-publish
          path: downloaded-artifacts/mygreatapp-macos-publish

      - name: Show downloaded files
        shell: bash
        run: |
          set -euo pipefail

          echo "Downloaded artifact contents:"
          find downloaded-artifacts \
            -type f \
            -print

      - name: Show file details
        shell: bash
        run: |
          ls -lhR downloaded-artifacts

      - name: Install Homebrew curl with SFTP support
        if: env.SFTP_USER != '' && env.SFTP_PASSWORD != '' && env.SFTP_BASE_URL != ''
        shell: bash
        run: |
          set -euo pipefail

          if brew list --versions curl >/dev/null 2>&1; then
            echo "Homebrew curl is already installed."
          else
            echo "Installing Homebrew curl..."
            brew install curl
          fi

          BREW_CURL="$(brew --prefix curl)/bin/curl"

          if [[ ! -x "$BREW_CURL" ]]; then
            echo "Homebrew curl was not found at:"
            echo "  $BREW_CURL"
            exit 1
          fi

          echo "Using Homebrew curl:"
          "$BREW_CURL" --version

          protocols="$(
            "$BREW_CURL" --version |
              awk '
                /^Protocols:/ {
                  for (i = 2; i <= NF; i++) print $i
                }
              '
          )"

          if ! grep -qx "sftp" <<< "$protocols"; then
            echo "Homebrew curl does not support SFTP." >&2
            exit 1
          fi

          echo "BREW_CURL=$BREW_CURL" >> "$GITHUB_ENV"

      - name: Trust SFTP server SSH host key
        if: env.SFTP_USER != '' && env.SFTP_PASSWORD != '' && env.SFTP_BASE_URL != ''
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$SFTP_BASE_URL" != sftp://* ]]; then
            echo "SFTP_SERVER_URL must start with sftp://." >&2
            exit 1
          fi

          SFTP_HOST="$(
            printf '%s' "$SFTP_BASE_URL" |
              sed -E 's#^sftp://([^/@]+@)?([^/:]+)(:[0-9]+)?/.*#\2#'
          )"

          echo "Adding SSH host key for $SFTP_HOST"

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          ssh-keyscan -H "$SFTP_HOST" >> "$HOME/.ssh/known_hosts"

          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Upload macOS artifacts to SFTP
        if: env.SFTP_USER != '' && env.SFTP_PASSWORD != '' && env.SFTP_BASE_URL != ''
        shell: bash
        env:
          LOCAL_ARTIFACT_DIR: downloaded-artifacts/mygreatapp-macos-publish
        run: |
          set -euo pipefail

          echo "Homebrew curl version:"
          "$BREW_CURL" --version

          protocols="$(
            "$BREW_CURL" --version |
              awk '
                /^Protocols:/ {
                  for (i = 2; i <= NF; i++) {
                    print $i
                  }
                }
              '
          )"

          if ! grep -qx "sftp" <<< "$protocols"; then
            echo "Homebrew curl does not support the SFTP protocol." >&2
            exit 1
          fi

          if [[ ! -d "$LOCAL_ARTIFACT_DIR" ]]; then
            echo "Artifact directory not found:" >&2
            echo "  $LOCAL_ARTIFACT_DIR" >&2
            exit 1
          fi

          files=()

          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(
            find "$LOCAL_ARTIFACT_DIR" \
              -maxdepth 1 \
              -type f \
              -print0
          )

          if (( ${#files[@]} == 0 )); then
            echo "No files found to upload." >&2
            exit 1
          fi

          SFTP_DESTINATION="${SFTP_BASE_URL%/}/macos/"

          echo "Uploading ${#files[@]} file(s) to:"
          echo "  $SFTP_DESTINATION"

          for file in "${files[@]}"; do
            filename="$(basename "$file")"

            echo "Uploading: $filename"

            "$BREW_CURL" \
              --fail \
              --show-error \
              --silent \
              --ftp-create-dirs \
              --user "$SFTP_USER:$SFTP_PASSWORD" \
              --upload-file "$file" \
              "${SFTP_DESTINATION}${filename}"
          done

          echo "macOS artifacts uploaded successfully."
        