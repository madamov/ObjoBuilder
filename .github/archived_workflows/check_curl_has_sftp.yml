name: Check if curl supports SFTP

on: [workflow_dispatch]
jobs:
  compare-curl:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, macos-15, macos-14]
    steps:
      - name: Print runner info
        run: |
          echo "runner label: $RUNNER_OS / $RUNNER_NAME"
          sw_vers -productVersion || true
          uname -m || true

      - name: Show which curl
        run: |
          echo "which curl: $(which curl)"
          ls -l "$(which curl)" || true

      - name: curl version and protocols
        run: |
          echo "curl -V output:"
          curl -V || true
          echo
          echo "Protocols line (look for 'sftp'):"
          curl -V | grep -i '^Protocols' || true

      - name: Install Homebrew curl if needed (and persist to PATH for later steps)
        shell: bash
        run: |
          set -euo pipefail

          # If system curl already supports sftp, skip install
          if curl -V 2>/dev/null | grep -qi 'sftp'; then
            echo "System curl already supports SFTP. Skipping Homebrew install."
            exit 0
          fi

          echo "System curl does NOT support SFTP. Installing curl via Homebrew (if needed)..."

          # Ensure Homebrew exists (runners usually have it)
          if ! command -v brew >/dev/null 2>&1; then
            echo "Homebrew not found — installing Homebrew..."
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
            # load common brew env locations (best-effort)
            eval "$(/opt/homebrew/bin/brew shellenv 2>/dev/null)" || true
            eval "$(/usr/local/bin/brew shellenv 2>/dev/null)" || true
          fi

          # Install or upgrade curl via brew
          brew install curl || brew upgrade curl || true

          # Try common candidate locations for the brew-installed curl
          CANDIDATES=(
            "$(brew --prefix)/opt/curl/bin/curl"
            "$(brew --prefix curl 2>/dev/null)/bin/curl"
            "$(brew --prefix)/bin/curl"
            "/opt/homebrew/opt/curl/bin/curl"
            "/usr/local/opt/curl/bin/curl"
          )

          NEW_CURL=""
          for c in "${CANDIDATES[@]}"; do
            if [ -n "$c" ] && [ -x "$c" ]; then
              NEW_CURL="$c"
              break
            fi
          done

          # As a last resort, look in the Cellar for the newest curl
          if [ -z "$NEW_CURL" ]; then
            if CELLAR_DIR="$(brew --cellar 2>/dev/null)/curl"; then
              if [ -d "$CELLAR_DIR" ]; then
                VER="$(ls -1 "$CELLAR_DIR" | sort -V | tail -n1 || true)"
                if [ -n "$VER" ] && [ -x "$CELLAR_DIR/$VER/bin/curl" ]; then
                  NEW_CURL="$CELLAR_DIR/$VER/bin/curl"
                fi
              fi
            fi
          fi

          if [ -z "$NEW_CURL" ] || [ ! -x "$NEW_CURL" ]; then
            echo "Could not locate a brew-installed curl binary. Leaving system curl."
            exit 0
          fi

          echo "Found brew curl at: $NEW_CURL"

          # Prepend directory of new curl to PATH for the remainder of the job:
          NEW_DIR="$(dirname "$NEW_CURL")"
          echo "Adding $NEW_DIR to PATH for subsequent steps"
          echo "$NEW_DIR" >> "$GITHUB_PATH"

          # Also update PATH in this step so the next commands see it immediately
          export PATH="$NEW_DIR:$PATH"
          echo "which curl now (this step): $(command -v curl)"
          echo "curl -V (this step):"
          curl -V || true

      - name: Confirm curl path & version (after potential brew install)
        run: |
          echo "Resolved curl binary: $(command -v curl)"
          ls -l "$(command -v curl)" || true
          echo "Full canonical path (using python):"
          python3 -c "import os,sys; print(os.path.realpath(sys.argv[1]))" "$(command -v curl)" || true
          echo
          echo "curl -V:"
          curl -V || true
          which curl

      - name: Fail if no SFTP support (optional)
        if: always()
        run: |
          if ! curl -V 2>/dev/null | grep -qi 'sftp'; then
            echo "ERROR: curl still does not support SFTP after attempted brew install."
            echo "You can use the brew curl directly by calling the full path shown above,"
            echo "or adjust the job to use that path for SFTP operations."
            exit 1
          else
            echo "Success: curl supports SFTP."
          fi
          